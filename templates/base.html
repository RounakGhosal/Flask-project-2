<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="/">MyApp</a>

        <div class="ms-auto">
            {% if session.user %}
            <a class="btn btn-outline-light me-2" href="/user">Dashboard</a>
            <a class="btn btn-outline-light me-2" href="/profile">Profile</a>
            <a class="btn btn-danger" href="/logout">Logout</a>
            {% else %}
            <a class="btn btn-success me-2" href="/login">Login</a>
            <a class="btn btn-primary" href="/register">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container mt-4">

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
        <div class="alert 
                {% if category == 'error' %}alert-danger
                {% else %}alert-success{% endif %}">
            {{ msg }}
        </div>
        {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

</body>

</html>
